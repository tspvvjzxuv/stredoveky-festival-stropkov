# Blueprint pre Render.com — po pushi na GitHub: Dashboard → New → Blueprint → vyberte repo
# Alebo: New Web Service → pripojte repo ručne (Build: npm install, Start: npm start)

services:
  - type: web
    name: stredoveky-festival-stropkov
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
