<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" role="img" aria-labelledby="mapTitle mapDesc">
  <title id="mapTitle">Mapa festivalového areálu — divadlo, turnaj, strelnica, táborák, rytierska cesta</title>
  <desc id="mapDesc">Stredoveká mapa so zónami: šerm, divadlo, lukostre?ba, strelnica deti, šach, guláš, nápoje, táborák, pokladnica.</desc>
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2e6d0"/>
      <stop offset="50%" style="stop-color:#e8d9be"/>
      <stop offset="100%" style="stop-color:#dcc9a8"/>
    </linearGradient>
    <linearGradient id="forest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6b4a"/>
      <stop offset="100%" style="stop-color:#2d4530"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="884" height="564" rx="4" fill="url(#parchment)" stroke="#5c1a1a" stroke-width="6"/>
  <rect x="20" y="20" width="860" height="540" rx="2" fill="none" stroke="#c9a227" stroke-width="2"/>

  <ellipse cx="140" cy="120" rx="100" ry="85" fill="url(#forest)" opacity="0.35"/>
  <ellipse cx="780" cy="140" rx="90" ry="70" fill="url(#forest)" opacity="0.3"/>
  <ellipse cx="820" cy="420" rx="70" ry="95" fill="url(#forest)" opacity="0.28"/>

  <path d="M 120 480 Q 200 400 280 360 T 420 280 T 520 200 T 480 120" fill="none" stroke="#8b6914" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <path d="M 480 120 L 520 200 L 680 260 L 720 340 L 620 420 L 480 480" fill="none" stroke="#a67c2a" stroke-width="10" stroke-linecap="round" stroke-dasharray="18 12" opacity="0.55"/>
  <path d="M 280 360 L 200 300 L 140 220" fill="none" stroke="#8b6914" stroke-width="8" stroke-linecap="round" opacity="0.45"/>

  <text x="195" y="335" fill="#6b5344" font-family="Georgia, serif" font-size="10" font-style="italic" transform="rotate(-32 195 335)">Rytierska cesta</text>

  <ellipse cx="480" cy="320" rx="200" ry="140" fill="#c4b896" opacity="0.4" stroke="#7a6b4a" stroke-width="1"/>

  <g font-family="Georgia, serif" font-size="11" fill="#3d2914" font-weight="bold">
    <rect x="48" y="228" width="118" height="36" rx="3" fill="#f4e8d4" stroke="#5c1a1a" stroke-width="1.5"/>
    <text x="107" y="244" text-anchor="middle" font-size="10">ŠERMIARI</text>
    <text x="107" y="256" text-anchor="middle" font-size="9" font-weight="normal">remeslá</text>

    <rect x="385" y="66" width="118" height="36" rx="3" fill="#f4e8d4" stroke="#5c1a1a" stroke-width="1.5"/>
    <text x="444" y="82" text-anchor="middle" font-size="10">DIVADLO</text>
    <text x="444" y="94" text-anchor="middle" font-size="9" font-weight="normal">festivalové</text>

    <rect x="688" y="208" width="124" height="40" rx="3" fill="#f4e8d4" stroke="#5c1a1a" stroke-width="1.5"/>
    <text x="750" y="225" text-anchor="middle" font-size="10">LUKOSTRE?BA</text>
    <text x="750" y="238" text-anchor="middle" font-size="9" font-weight="normal">turnaj</text>

    <rect x="168" y="392" width="118" height="36" rx="3" fill="#f4e8d4" stroke="#5c1a1a" stroke-width="1.5"/>
    <text x="227" y="408" text-anchor="middle" font-size="10">STRELNICA</text>
    <text x="227" y="420" text-anchor="middle" font-size="9" font-weight="normal">aj pre deti</text>

    <rect x="318" y="288" width="100" height="30" rx="3" fill="#f4e8d4" stroke="#5c1a1a" stroke-width="1.5"/>
    <text x="368" y="307" text-anchor="middle" font-size="10">ŠACH</text>

    <rect x="588" y="432" width="118" height="36" rx="3" fill="#f4e8d4" stroke="#5c1a1a" stroke-width="1.5"/>
    <text x="647" y="448" text-anchor="middle" font-size="10">TÁBORÁK</text>
    <text x="647" y="460" text-anchor="middle" font-size="9" font-weight="normal">guláš</text>

    <rect x="330" y="492" width="200" height="34" rx="3" fill="#f4e8d4" stroke="#c9a227" stroke-width="2"/>
    <text x="430" y="508" text-anchor="middle" font-size="10">JEDLO · NÁPOJE</text>
    <text x="430" y="520" text-anchor="middle" font-size="9" font-weight="normal">po?as podujatia</text>

    <rect x="560" y="500" width="110" height="28" rx="3" fill="#f4e8d4" stroke="#c9a227" stroke-width="2"/>
    <text x="615" y="518" text-anchor="middle" font-size="10">POKLADNICA</text>

    <rect x="72" y="458" width="76" height="26" rx="3" fill="#f4e8d4" stroke="#5c1a1a" stroke-width="1.5"/>
    <text x="110" y="476" text-anchor="middle" font-size="11">BRÁNA</text>
  </g>

  <g stroke="#5c1a1a" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 420 95 L 450 60 L 480 95 L 450 110 Z"/>
    <circle cx="755" cy="280" r="22"/>
    <circle cx="755" cy="280" r="8"/>
    <line x1="755" y1="258" x2="755" y2="246"/>
  </g>

  <g id="ulohy" filter="url(#shadow)">
    <g id="uloha-1">
      <title>Úloha 1 — rytierska cesta pri bráne</title>
      <circle cx="110" cy="430" r="22" fill="#5c1a1a" stroke="#c9a227" stroke-width="3"/>
      <text x="110" y="437" text-anchor="middle" fill="#f4e8d4" font-family="Georgia, serif" font-size="18" font-weight="bold">1</text>
    </g>
    <g id="uloha-2">
      <title>Úloha 2 — šermiári</title>
      <circle cx="130" cy="300" r="22" fill="#5c1a1a" stroke="#c9a227" stroke-width="3"/>
      <text x="130" y="307" text-anchor="middle" fill="#f4e8d4" font-family="Georgia, serif" font-size="18" font-weight="bold">2</text>
    </g>
    <g id="uloha-3">
      <title>Úloha 3 — festivalové divadlo</title>
      <circle cx="450" cy="155" r="22" fill="#5c1a1a" stroke="#c9a227" stroke-width="3"/>
      <text x="450" y="162" text-anchor="middle" fill="#f4e8d4" font-family="Georgia, serif" font-size="18" font-weight="bold">3</text>
    </g>
    <g id="uloha-4">
      <title>Úloha 4 — lukostrelecký turnaj</title>
      <circle cx="700" cy="300" r="22" fill="#5c1a1a" stroke="#c9a227" stroke-width="3"/>
      <text x="700" y="307" text-anchor="middle" fill="#f4e8d4" font-family="Georgia, serif" font-size="18" font-weight="bold">4</text>
    </g>
    <g id="uloha-5">
      <title>Úloha 5 — strelnica pre deti</title>
      <circle cx="250" cy="390" r="22" fill="#5c1a1a" stroke="#c9a227" stroke-width="3"/>
      <text x="250" y="397" text-anchor="middle" fill="#f4e8d4" font-family="Georgia, serif" font-size="18" font-weight="bold">5</text>
    </g>
    <g id="uloha-6">
      <title>Úloha 6 — táborák a guláš</title>
      <circle cx="640" cy="400" r="22" fill="#5c1a1a" stroke="#c9a227" stroke-width="3"/>
      <text x="640" y="407" text-anchor="middle" fill="#f4e8d4" font-family="Georgia, serif" font-size="18" font-weight="bold">6</text>
    </g>
    <g id="uloha-7">
      <title>Úloha 7 — šach, jedlo a nápoje</title>
      <circle cx="400" cy="318" r="22" fill="#5c1a1a" stroke="#c9a227" stroke-width="3"/>
      <text x="400" y="325" text-anchor="middle" fill="#f4e8d4" font-family="Georgia, serif" font-size="18" font-weight="bold">7</text>
    </g>
    <g id="uloha-8">
      <title>Úloha 8 — pokladnica žetónov</title>
      <circle cx="520" cy="478" r="22" fill="#5c1a1a" stroke="#c9a227" stroke-width="3"/>
      <text x="520" y="485" text-anchor="middle" fill="#f4e8d4" font-family="Georgia, serif" font-size="18" font-weight="bold">8</text>
    </g>
  </g>

  <text x="450" y="42" text-anchor="middle" fill="#5c1a1a" font-family="Georgia, serif" font-size="20" font-weight="bold" letter-spacing="0.12em">PÚ? PO AREÁLI</text>
  <text x="450" y="62" text-anchor="middle" fill="#6b4420" font-family="Georgia, serif" font-size="11" font-style="italic">Stredoveký festival — Pod vlekom</text>

  <g transform="translate(820, 68)" opacity="0.7">
    <circle r="28" fill="#f4e8d4" stroke="#5c1a1a" stroke-width="1.5"/>
    <polygon points="0,-22 5,0 0,22 -5,0" fill="#c9a227"/>
    <text y="4" text-anchor="middle" fill="#3d2914" font-family="Georgia, serif" font-size="10" font-weight="bold">S</text>
  </g>
</svg>
